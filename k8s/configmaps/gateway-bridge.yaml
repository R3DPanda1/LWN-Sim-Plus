apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-bridge-config
  namespace: lorawan
data:
  chirpstack-gateway-bridge.toml: |
    [backend]
    type = "semtech_udp"

      [backend.semtech_udp]
      udp_bind = "0.0.0.0:1700"

    [integration]
    marshaler = "protobuf"

      [integration.mqtt]

        [integration.mqtt.auth.generic]
        servers=[
          "tcp://mosquitto:1883",
        ]
