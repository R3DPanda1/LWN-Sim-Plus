apiVersion: apps/v1
kind: Deployment
metadata:
  name: chirpstack
  namespace: lorawan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chirpstack
  template:
    metadata:
      labels:
        app: chirpstack
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do sleep 2; done']
        - name: wait-for-mosquitto
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z mosquitto 1883; do sleep 2; done']
      containers:
        - name: chirpstack
          image: chirpstack/chirpstack:4
          args: ["-c", "/etc/chirpstack"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/chirpstack
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: chirpstack-config
---
apiVersion: v1
kind: Service
metadata:
  name: chirpstack
  namespace: lorawan
spec:
  type: NodePort
  selector:
    app: chirpstack
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
