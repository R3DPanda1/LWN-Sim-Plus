apiVersion: apps/v1
kind: Deployment
metadata:
  name: chirpstack-rest-api
  namespace: lorawan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chirpstack-rest-api
  template:
    metadata:
      labels:
        app: chirpstack-rest-api
    spec:
      initContainers:
        - name: wait-for-chirpstack
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z chirpstack 8080; do sleep 2; done']
      containers:
        - name: rest-api
          image: chirpstack/chirpstack-rest-api:4
          args: ["--server", "chirpstack:8080", "--bind", "0.0.0.0:8090", "--insecure"]
          ports:
            - containerPort: 8090
          readinessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: chirpstack-rest-api
  namespace: lorawan
spec:
  type: NodePort
  selector:
    app: chirpstack-rest-api
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30090
