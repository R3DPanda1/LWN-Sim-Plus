apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator
  namespace: lorawan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simulator
  template:
    metadata:
      labels:
        app: simulator
    spec:
      initContainers:
        - name: wait-for-gateway-bridge
          image: busybox:1.36
          command: ['sh', '-c', 'sleep 5']
        - name: wait-for-rest-api
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z chirpstack-rest-api 8090; do sleep 2; done']
      containers:
        - name: simulator
          image: lwn-simulator:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
              name: http
            - containerPort: 8003
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /app/config.json
              subPath: config.json
            - name: data
              mountPath: /app/data
          resources:
            limits:
              cpu: "2"
              memory: 1024Mi
            requests:
              cpu: "500m"
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /dashboard
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: simulator-config
        - name: data
          persistentVolumeClaim:
            claimName: simulator-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: simulator-data
  namespace: lorawan
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: simulator
  namespace: lorawan
spec:
  type: NodePort
  selector:
    app: simulator
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      nodePort: 30002
    - name: metrics
      port: 8003
      targetPort: 8003
      nodePort: 30003
